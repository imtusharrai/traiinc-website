        // Inline Cost Estimator Logic
        function calculateEstimate() {
            const typeValue = parseInt(document.getElementById('calcType').value);
            const loginValue = document.getElementById('calcLogin').value;
            let total = typeValue;
            if (loginValue === 'yes') total += 20000;

            const formatted = new Intl.NumberFormat('en-IN').format(total);
            document.getElementById('estimatePrice').textContent = '₹' + formatted;
            document.getElementById('estimateResult').style.display = 'block';
            document.getElementById('estimateResult').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
