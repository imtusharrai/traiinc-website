<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    font-family: 'Inter', sans-serif;
    color: white;
  }

  .controls {
    margin-bottom: 24px;
    text-align: center;
  }
  .controls h2 { font-family: 'Outfit', sans-serif; font-weight: 600; margin-bottom: 6px; }
  .controls p { color: rgba(255,255,255,0.5); font-size: 14px; }

  /* ═══════════════════════════════════════════
     THE CANVAS — 1080 × 1080
     ═══════════════════════════════════════════ */
  #card-canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #0c0608;
  }

  /* ── Full-bleed person image ── */
  .person-image {
    position: absolute;
    inset: 0;
    z-index: 1;
  }
  .person-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
  }

  /* ── Left gradient overlay (dark → transparent) ── */
  .left-overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: linear-gradient(
      to right,
      rgba(10, 4, 6, 0.95) 0%,
      rgba(10, 4, 6, 0.92) 15%,
      rgba(10, 4, 6, 0.85) 25%,
      rgba(10, 4, 6, 0.65) 38%,
      rgba(10, 4, 6, 0.3) 50%,
      rgba(10, 4, 6, 0.05) 62%,
      transparent 72%
    );
    pointer-events: none;
  }

  /* ── Subtle warm tint on the bottom edge ── */
  .bottom-vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: linear-gradient(
      to top,
      rgba(10, 4, 6, 0.6) 0%,
      rgba(10, 4, 6, 0.2) 15%,
      transparent 30%
    );
    pointer-events: none;
  }

  /* ── Content — Left Side Branding ── */
  .brand-content {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 45%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 60px;
    pointer-events: none;
  }

  .logo-lockup {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 30px;
  }
  .logo-lockup img {
    height: 65px;
    width: auto;
    border-radius: 14px;
  }
  .logo-lockup .brand-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 52px;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
  }

  .tagline {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.9);
    line-height: 1.5;
    margin-bottom: 35px;
  }
  .tagline strong {
    font-weight: 700;
    background: linear-gradient(90deg, #E87A3A, #F5C842);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .url {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.5px;
  }
</style>
