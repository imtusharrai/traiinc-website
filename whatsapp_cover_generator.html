<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Cover — Trai Inc — Concept B: The Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    font-family: 'Inter', sans-serif;
    color: white;
  }

  .controls {
    margin-bottom: 24px;
    text-align: center;
  }
  .controls h2 { font-family: 'Outfit', sans-serif; font-weight: 600; margin-bottom: 6px; }
  .controls p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 12px; }
  .controls button {
    padding: 8px 18px;
    background: #E63946;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    margin: 0 6px;
  }
  .controls button:hover { background: #c7303c; }
  .controls button.secondary { background: rgba(255,255,255,0.1); }
  .controls button.secondary:hover { background: rgba(255,255,255,0.2); }

  /* ═══════════════════════════════════════════
     THE CANVAS — 1211 × 681
     ═══════════════════════════════════════════ */
  #cover-canvas {
    width: 1211px;
    height: 681px;
    position: relative;
    overflow: hidden;
    /* Deep dark warm background — NOT pure black, NOT cold */
    background: #0c0608;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  /* ── Warm ambient glow layer ── */
  .ambient-glow {
    position: absolute;
    inset: 0;
    /* Subtle warm reddish-purple ambient fill */
    background: radial-gradient(ellipse at 30% 40%, rgba(90, 20, 30, 0.35) 0%, transparent 65%),
                radial-gradient(ellipse at 80% 70%, rgba(60, 15, 10, 0.2) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── THE SIGNAL — abstract gradient wave ──
       A bold ascending ribbon/wave sweeping from lower-left 
       toward upper-right. Built with layered clip-path shapes
       carrying the brand gradient: red → coral → orange → amber/gold */
  .signal-wave {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  /* Primary wave ribbon */
  .signal-wave .ribbon-1 {
    position: absolute;
    bottom: -10%;
    left: -10%;
    width: 130%;
    height: 110%;
    background: linear-gradient(135deg, 
      #8B1A1A 0%,
      #E63946 20%, 
      #F2575D 35%,
      #E87A3A 55%, 
      #F0A030 75%,
      #F5C842 100%
    );
    clip-path: polygon(
      0% 100%,
      0% 72%,
      8% 65%,
      18% 58%,
      28% 52%,
      38% 48%,
      48% 42%,
      55% 37%,
      62% 31%,
      70% 26%,
      78% 20%,
      85% 16%,
      92% 12%,
      100% 8%,
      100% 18%,
      92% 22%,
      85% 26%,
      78% 31%,
      70% 37%,
      62% 42%,
      55% 48%,
      48% 53%,
      38% 58%,
      28% 63%,
      18% 68%,
      8% 75%,
      0% 82%
    );
    opacity: 0.5;
  }

  /* Secondary thinner accent ribbon — slightly offset, lighter */
  .signal-wave .ribbon-2 {
    position: absolute;
    bottom: -10%;
    left: -5%;
    width: 125%;
    height: 110%;
    background: linear-gradient(135deg, 
      #E63946 0%,
      #F2575D 30%, 
      #E87A3A 60%, 
      #F5C842 100%
    );
    clip-path: polygon(
      0% 100%,
      0% 74%,
      10% 66%,
      20% 59%,
      30% 53%,
      40% 47%,
      50% 41%,
      60% 35%,
      70% 29%,
      80% 23%,
      90% 17%,
      100% 11%,
      100% 14%,
      90% 20%,
      80% 26%,
      70% 32%,
      60% 38%,
      50% 44%,
      40% 50%,
      30% 56%,
      20% 62%,
      10% 69%,
      0% 77%
    );
    opacity: 0.3;
  }

  /* Soft glow behind the wave for depth */
  .signal-wave .wave-glow {
    position: absolute;
    bottom: 5%;
    left: 10%;
    width: 80%;
    height: 60%;
    background: radial-gradient(ellipse at 40% 80%, rgba(230, 57, 70, 0.15) 0%, transparent 60%);
  }

  /* ── Content layer ── */
  .content-layer {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }

  /* ── Logo + Name horizontal lockup ── */
  .logo-lockup {
    position: absolute;
    top: 18%;
    right: 14%;
    display: flex;
    align-items: center;
    gap: 20px;
    pointer-events: auto;
  }

  .logo-lockup img {
    height: 90px;
    width: auto;
    display: block;
    border-radius: 16px;
  }

  .logo-lockup .brand-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 72px;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
  }

  /* ── Tagline ── */
  .tagline {
    position: absolute;
    top: 46%;
    left: 5%;
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 26px;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 0.3px;
    line-height: 1.45;
  }
  .tagline strong {
    font-weight: 600;
    color: #ffffff;
  }

  /* ── Bottom-right URL ── */
  .url {
    position: absolute;
    bottom: 10%;
    top: 66%;
    left: 5%;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 0.5px;
  }

  /* ── Dead zone toggle ── */
  .dead-zone {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 170px;
    border: 2px dashed rgba(255,255,255,0.25);
    border-bottom: none;
    border-radius: 150px 150px 0 0;
    pointer-events: none;
    display: none;
    z-index: 20;
  }
  .dead-zone::after {
    content: 'Profile Photo Zone';
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
  }

  /* ── Preview container ── */
  .preview-section {
    margin-top: 40px;
    text-align: center;
    display: none;
  }
  .preview-section.show { display: block; }
  .preview-section h3 { margin-bottom: 12px; color: rgba(255,255,255,0.6); font-weight: 400; }
  .preview-frame {
    width: 400px;
    height: 225px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    margin: 0 auto;
    position: relative;
  }
  .preview-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>

<div class="controls">
  <h2>Concept B — "The Signal"</h2>
  <p>Screenshot the canvas below at 1211 × 681 px. Use Cmd+Shift+4 on Mac.</p>
  <button onclick="document.querySelector('.dead-zone').style.display = document.querySelector('.dead-zone').style.display === 'block' ? 'none' : 'block'">Toggle Dead Zone</button>
</div>

<!-- ═══════════ THE CANVAS ═══════════ -->
<div id="cover-canvas">

  <!-- Ambient warm glow -->
  <div class="ambient-glow"></div>

  <!-- THE SIGNAL — gradient wave -->
  <div class="signal-wave">
    <div class="wave-glow"></div>
    <div class="ribbon-1"></div>
    <div class="ribbon-2"></div>
  </div>

  <!-- Content -->
  <div class="content-layer">

    <!-- Logo + Brand Name lockup -->
    <div class="logo-lockup">
      <img src="assets/logos/logo.png" alt="Trai Inc" onerror="this.style.display='none'">
      <span class="brand-name">Trai Inc</span>
    </div>

    <!-- Tagline -->
    <div class="tagline">
      We build the tech.<br>You grow the <strong>business.</strong>
    </div>

    <!-- URL -->
    <div class="url">traiinc.com</div>

    <!-- Dead zone guide -->
    <div class="dead-zone"></div>

  </div>
</div>

</body>
</html>
